const {useState,useEffect,useRef,createContext,useContext}=React;

/* ═══════════════════════════════════════════════ */
/*  CONTEXT                                        */
/* ═══════════════════════════════════════════════ */
const Ctx=createContext();
function Provider({children}){
  const [page,setPage]=useState('home');
  const [scrolled,setScrolled]=useState(false);
  const [menu,setMenu]=useState(false);
  const [modal,setModal]=useState(null);
  const [clubShow,setClubShow]=useState(false);

  const go=(p)=>{setPage(p);setMenu(false);window.scrollTo({top:0,behavior:'smooth'})};
  const openModal=(t)=>{setModal(t);document.body.style.overflow='hidden'};
  const closeModal=()=>{setModal(null);document.body.style.overflow=''};

  useEffect(()=>{
    const onScroll=()=>{
      setScrolled(window.scrollY>60);
      const p=document.getElementById('scroll-progress');
      if(p){const h=document.documentElement.scrollHeight-window.innerHeight;p.style.width=h>0?(window.scrollY/h*100)+'%':'0%'}
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    // Wine club invite after 25s
    const t=setTimeout(()=>setClubShow(true),25000);
    return()=>{window.removeEventListener('scroll',onScroll);clearTimeout(t)};
  },[]);

  return <Ctx.Provider value={{page,go,scrolled,menu,setMenu,modal,openModal,closeModal,clubShow,setClubShow}}>{children}</Ctx.Provider>;
}

function useReveal(){useEffect(()=>{
  const o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:0.08});
  document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>o.observe(el));
  return()=>o.disconnect();
})}

/*  WINE FINDER QUIZ                               */
/* ═══════════════════════════════════════════════ */
function WineQuiz(){
  const[step,setStep]=useState(0);const[ans,setAns]=useState([]);const[res,setRes]=useState(null);
  const pick=(v)=>{const a=[...ans,v];setAns(a);if(step<QUIZ_Q.length-1)setStep(step+1);else{const c={};a.forEach(x=>{c[x]=(c[x]||0)+1});setRes(QUIZ_R[Object.keys(c).reduce((a,b)=>c[a]>c[b]?a:b)])}};
  const reset=()=>{setStep(0);setAns([]);setRes(null)};
  if(res)return(<div className="text-center"><div className="text-4xl mb-4">🍷</div><h3 className="font-heading text-navy text-2xl mb-2">Your Wine: {res.wine}</h3><div className="section-line my-4"/><p className="font-body text-navy/55 text-sm leading-relaxed max-w-md mx-auto mb-6">{res.desc}</p><button onClick={reset} className="font-body text-green-bottle text-sm font-semibold hover:text-gold-dark transition-colors">Take it again →</button></div>);
  const q=QUIZ_Q[step];
  return(<div>
    <div className="flex gap-1 mb-6">{QUIZ_Q.map((_,i)=><div key={i} className={`h-1 flex-1 rounded-full ${i<=step?'bg-gold':'bg-navy/10'}`}/>)}</div>
    <h3 className="font-heading text-navy text-xl mb-6">{q.q}</h3>
    <div className="grid grid-cols-2 gap-3">{q.opts.map((o,i)=><button key={i} onClick={()=>pick(o.v)} className="border-2 border-navy/10 rounded-lg p-4 text-left hover:border-gold hover:bg-gold/5 transition-all bg-white"><span className="font-body text-navy text-sm">{o.t}</span></button>)}</div>
  </div>);
}

        </div>
        <div className="relative rounded-xl border border-navy/10 bg-white/40 backdrop-blur-sm p-8 md:p-12 shadow-sm">

        <div className="flex flex-col lg:flex-row items-center gap-12 reveal">

            <p className="font-body text-gold text-sm tracking-[4px] uppercase mb-4">Presidential Land</p>

}

function App(){
  return(

}
