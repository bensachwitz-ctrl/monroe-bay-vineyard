  const [clubShow,setClubShow]=useState(false);

  const go=(p)=>{setPage(p);setMenu(false);window.scrollTo({top:0,behavior:'smooth'})};
  const openModal=(t)=>{setModal(t);document.body.style.overflow='hidden'};
  const closeModal=()=>{setModal(null);document.body.style.overflow=''};

  useEffect(()=>{
    const onScroll=()=>{
      setScrolled(window.scrollY>60);
      const p=document.getElementById('scroll-progress');
      if(p){const h=document.documentElement.scrollHeight-window.innerHeight;p.style.width=h>0?(window.scrollY/h*100)+'%':'0%'}
    };
    window.addEventListener('scroll',onScroll,{passive:true});
    // Wine club invite after 25s
    const t=setTimeout(()=>setClubShow(true),25000);
    return()=>{window.removeEventListener('scroll',onScroll);clearTimeout(t)};
  },[]);

  return <Ctx.Provider value={{page,go,scrolled,menu,setMenu,modal,openModal,closeModal,clubShow,setClubShow}}>{children}</Ctx.Provider>;
}

function useReveal(){useEffect(()=>{
  const o=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:0.08});
  document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>o.observe(el));
  return()=>o.disconnect();
})}

/*  WINE QUIZ                                      */
/* ═══════════════════════════════════════════════ */
function WineQuiz(){
  const [step,setStep]=useState(0);
  const [scores,setScores]=useState({bold:0,crisp:0,social:0,mellow:0});
  const [result,setResult]=useState(null);

  const pick=v=>{
    const ns={...scores,[v]:scores[v]+1};
    setScores(ns);
    if(step===2){
      const mx=Math.max(...Object.values(ns));
      const w=Object.keys(ns).find(k=>ns[k]===mx);
      setResult(w);
    }else setStep(step+1);
  };

  if(result){
    const r=QUIZ_R[result];
    return(
      <div className="text-center py-12 reveal">
        <h3 className="font-display text-4xl text-navy mb-3">{r.wine}</h3>
        <p className="text-navy/70 font-body max-w-lg mx-auto mb-8">{r.desc}</p>
        <button onClick={()=>{setStep(0);setScores({bold:0,crisp:0,social:0,mellow:0});setResult(null)}} className="btn-gold">Start Over</button>
      </div>
    );
  }

  return(
    <div className="text-center reveal">
      <h3 className="font-heading text-2xl text-navy mb-8">{QUIZ_Q[step].q}</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-md mx-auto">
        {QUIZ_Q[step].opts.map((o,i)=>(
          <button key={i} onClick={()=>pick(o.v)} className="p-4 bg-cream border-2 border-gold/20 hover:border-gold hover:bg-gold/5 rounded-lg transition-all font-body text-sm text-navy">
            {o.t}
          </button>
        ))}
      </div>
      <div className="flex gap-1 justify-center mt-8">
        {[0,1,2].map(i=><div key={i} className={`h-1 w-8 rounded ${i<=step?'bg-gold':'bg-gold/20'}`}/>)}
      </div>
    </div>
  );
}

    const map=L.map(mapRef.current).setView([38.24,-76.88],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap contributors',
      maxZoom:19
    }).addTo(map);
    L.marker([38.24,-76.88]).addTo(map).bindPopup('<b>Monroe Bay Vineyard</b><br/>4786 James Monroe Hwy<br/>Colonial Beach, VA 22443<br/>(804) 410-5628');
  },[]);
  return <div ref={mapRef} className="reveal bg-white rounded-lg overflow-hidden depth" style={{height:'500px'}}/>;
}

  return(

function App(){
