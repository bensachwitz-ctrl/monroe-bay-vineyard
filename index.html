<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monroe Bay Vineyard & Cidery | Waterfront Winery Colonial Beach Virginia</title>
  <meta name="description" content="Monroe Bay Vineyard & Cidery: Award-winning wines and craft ciders at a stunning straw bale barn on the historic James Monroe Birthplace Farm. Waterfront weddings, tastings, and the Chesapeake Bay Wine Trail's finest destination in Colonial Beach, Virginia.">
  <meta name="keywords" content="waterfront winery Virginia, Colonial Beach wedding venue, Virginia wine tasting, Chesapeake Bay Wine Trail, straw bale barn winery, Monroe Bay Vineyard, waterfront wedding Virginia, Colonial Beach winery, Virginia vineyard, craft cider Virginia">
  <meta property="og:title" content="Monroe Bay Vineyard & Cidery | Where the River Meets the Vine">
  <meta property="og:description" content="History poured by the glass. Award-winning wines, craft ciders & waterfront weddings at the James Monroe Birthplace Farm.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bensachwitz-ctrl.github.io/monroe-bay-vineyard/">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://bensachwitz-ctrl.github.io/monroe-bay-vineyard/">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'river': { DEFAULT: '#1B263B', light: '#2B3A55', dark: '#0F1A2B' },
            'straw': { DEFAULT: '#E0C389', light: '#F4D89F', dark: '#C49A3C', cream: '#FAF7F2' },
            'bottle': { DEFAULT: '#2D6A4F', light: '#40916C', dark: '#1B4332', glass: 'rgba(45,106,79,0.12)' },
            'creek': { DEFAULT: '#4A7C8A', light: '#6BA3B1' },
          },
          fontFamily: {
            'display': ['Cormorant Garamond', 'serif'],
            'heading': ['Playfair Display', 'serif'],
            'body': ['Montserrat', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: rgba(224,195,137,0.35); color: var(--river); }

    :root {
      --river: #1B263B;
      --river-light: #2B3A55;
      --straw: #E0C389;
      --straw-light: #F4D89F;
      --bottle: #2D6A4F;
      --bottle-light: #40916C;
      --creek: #4A7C8A;
      --cream: #FAF7F2;
      --sand: #D4C5A9;
      --text-dark: #2C3E50;
      --text-light: #F5F1E8;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      line-height: 1.7;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--straw); }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }

    /* === BOTTLE-WALL GLASSMORPHISM === */
    .glass-bottle {
      background: rgba(45, 106, 79, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(45, 106, 79, 0.15);
      box-shadow: 0 8px 32px rgba(45, 106, 79, 0.08);
    }

    .glass-nav {
      background: rgba(27, 38, 59, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(224, 195, 137, 0.12);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-nav.scrolled {
      background: rgba(27, 38, 59, 0.92);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
    }

    .glass-card {
      background: linear-gradient(135deg, rgba(250,247,242,0.85), rgba(245,241,232,0.65));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(45, 106, 79, 0.15);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(45, 106, 79, 0.12);
      border-color: rgba(224, 195, 137, 0.35);
    }

    /* === TACTILE TEXTURES === */
    .texture-parchment {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(212,197,169,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(224,195,137,0.06) 0%, transparent 50%),
        linear-gradient(180deg, rgba(250,247,242,1), rgba(245,241,232,1));
    }

    .texture-straw {
      background-image:
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(212,197,169,0.04) 2px, rgba(212,197,169,0.04) 4px),
        repeating-linear-gradient(0deg, transparent, transparent 8px, rgba(212,197,169,0.03) 8px, rgba(212,197,169,0.03) 10px);
    }

    .texture-creek {
      background: linear-gradient(135deg, rgba(74,124,138,0.04), rgba(45,106,79,0.03), rgba(74,124,138,0.05));
    }

    /* === ANIMATIONS === */
    .ken-burns {
      animation: kenBurns 25s ease-in-out infinite alternate;
    }

    @keyframes kenBurns {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, -1.5%); }
    }

    .hero-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 40%,
        rgba(224, 195, 137, 0.08) 45%,
        rgba(224, 195, 137, 0.15) 50%,
        rgba(224, 195, 137, 0.08) 55%,
        transparent 60%
      );
      animation: shimmerMove 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmerMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .gold-text {
      background: linear-gradient(135deg, #E0C389, #F4D89F, #C49A3C, #E0C389);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: goldShimmer 4s ease-in-out infinite;
    }

    @keyframes goldShimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Scroll Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }

    /* Parallax */
    .parallax-section {
      position: relative;
      overflow: hidden;
    }

    .parallax-bg {
      position: absolute;
      inset: -20% 0;
      will-change: transform;
    }

    /* Scroll Progress */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--straw), var(--bottle), var(--straw));
      z-index: 100;
      transition: width 0.08s linear;
    }

    /* Buttons */
    .btn-gold {
      background: var(--straw);
      color: var(--river);
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border: 2px solid var(--straw);
      position: relative;
      overflow: hidden;
    }

    .btn-gold::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .btn-gold:hover::before { left: 100%; }

    .btn-gold:hover {
      background: transparent;
      color: var(--straw);
      box-shadow: 0 8px 25px rgba(224, 195, 137, 0.25);
    }

    .btn-outline {
      background: transparent;
      color: var(--river);
      border: 2px solid var(--river);
      font-weight: 600;
      transition: all 0.35s ease;
    }

    .btn-outline:hover {
      background: var(--river);
      color: var(--cream);
    }

    /* Nav */
    .nav-link {
      color: var(--text-light);
      transition: all 0.3s ease;
      position: relative;
      cursor: pointer;
    }

    .nav-link:hover { color: var(--straw); }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--straw);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    /* Modals */
    .modal-backdrop {
      background: rgba(27, 38, 59, 0.65);
      backdrop-filter: blur(10px);
    }

    .modal-panel {
      background: linear-gradient(145deg, var(--cream), #F5F1E8);
      border: 1px solid rgba(224, 195, 137, 0.2);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
    }

    .form-input {
      border: 1px solid rgba(45, 106, 79, 0.2);
      background: rgba(250, 247, 242, 0.7);
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
    }

    .form-input:focus {
      border-color: var(--straw);
      background: rgba(250, 247, 242, 0.95);
      box-shadow: 0 0 0 3px rgba(224, 195, 137, 0.15);
      outline: none;
    }

    /* Wine & Wedding Grids */
    .wine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .wedding-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .wedding-gallery img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 8px;
      transition: all 0.4s ease;
      filter: brightness(0.95);
    }

    .wedding-gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      filter: brightness(1.02);
    }

    /* Wine Card Color Swatch */
    .color-swatch {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    /* Quiz */
    .quiz-option {
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid rgba(45, 106, 79, 0.15);
      padding: 1.25rem;
      border-radius: 8px;
      text-align: center;
      background: rgba(250, 247, 242, 0.6);
    }

    .quiz-option:hover {
      border-color: var(--straw);
      background: rgba(224, 195, 137, 0.1);
      transform: translateY(-3px);
    }

    /* Floating CTA */
    .floating-cta {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 40;
      animation: gentleFloat 4s ease-in-out infinite;
      box-shadow: 0 8px 25px rgba(224, 195, 137, 0.4);
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Loading */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1000;
      animation: fadeOut 0.5s ease 0.8s forwards;
    }

    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

    /* Page transition */
    main > div { animation: pageIn 0.4s ease-out; }
    @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .loading-logo { animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.97); }
    }

    /* Divider */
    .bottle-divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--straw), transparent);
      margin: 0 auto 2rem;
    }

    /* Hero overlay */
    .hero-overlay {
      background: linear-gradient(
        160deg,
        rgba(27, 38, 59, 0.5) 0%,
        rgba(27, 38, 59, 0.3) 40%,
        rgba(45, 106, 79, 0.25) 100%
      );
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .wine-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .wine-grid { grid-template-columns: 1fr; }
      .wedding-gallery { grid-template-columns: 1fr; }
      .wedding-gallery img { height: 260px; }
    }
    @media (max-width: 480px) {
      h1 { font-size: 2rem !important; }
      .glass-nav { padding-left: 1rem; padding-right: 1rem; }
      .floating-cta { bottom: 1rem; right: 1rem; }
    }

    /* Enhanced Glass Card Glow */
    .glass-card {
      transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 50px rgba(45, 106, 79, 0.15), 0 0 30px rgba(224, 195, 137, 0.08);
      border-color: rgba(224, 195, 137, 0.4);
    }

    /* Stagger Children Animation */
    .stagger-in > * {
      opacity: 0;
      transform: translateY(30px);
      animation: staggerFadeIn 0.6s ease forwards;
    }
    .stagger-in > *:nth-child(1) { animation-delay: 0.05s; }
    .stagger-in > *:nth-child(2) { animation-delay: 0.12s; }
    .stagger-in > *:nth-child(3) { animation-delay: 0.19s; }
    .stagger-in > *:nth-child(4) { animation-delay: 0.26s; }
    .stagger-in > *:nth-child(5) { animation-delay: 0.33s; }
    .stagger-in > *:nth-child(6) { animation-delay: 0.40s; }
    .stagger-in > *:nth-child(7) { animation-delay: 0.47s; }
    .stagger-in > *:nth-child(8) { animation-delay: 0.54s; }
    @keyframes staggerFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Modal entrance */
    .modal-panel {
      animation: modalSlideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Event card hover */
    .event-card {
      cursor: default;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 8px;
      background: transparent;
    }
    .event-card:hover {
      background: rgba(224, 195, 137, 0.06);
      transform: translateX(8px);
      box-shadow: -4px 0 20px rgba(224, 195, 137, 0.12);
    }

    /* Image hover zoom for galleries */
    .img-hover-zoom {
      overflow: hidden;
      border-radius: 12px;
    }
    .img-hover-zoom img {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), filter 0.4s ease;
    }
    .img-hover-zoom:hover img {
      transform: scale(1.08);
      filter: brightness(1.05);
    }

    /* Subtle page hero text reveal */
    .hero-text-reveal {
      animation: heroTextIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes heroTextIn {
      from { opacity: 0; transform: translateY(20px); letter-spacing: 0.3em; }
      to { opacity: 1; transform: translateY(0); letter-spacing: 0.15em; }
    }

    /* Animated counter pulse */
    .stat-circle {
      transition: all 0.4s ease;
    }
    .stat-circle:hover {
      transform: scale(1.12);
      box-shadow: 0 8px 25px rgba(224, 195, 137, 0.3);
    }

    /* Cellar hero mini */
    .page-hero-mini {
      position: relative;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page-hero-mini img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @media (max-width: 768px) {
      .page-hero-mini { height: 220px; }
    }

    /* Wine card pairing chip */
    .pairing-chip {
      display: inline-block;
      background: rgba(45, 106, 79, 0.08);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      color: var(--bottle);
      margin-top: 0.5rem;
    }

    /* Floating particles subtle */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat linear infinite;
      opacity: 0.12;
    }
    @keyframes particleFloat {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% { transform: translateY(-100vh) translateX(30px); opacity: 0; }
    }

    /* Testimonial quote accent */
    .testimonial-card::before {
      content: '\201C';
      position: absolute;
      top: -8px;
      left: 16px;
      font-size: 4rem;
      font-family: 'Cormorant Garamond', serif;
      color: rgba(224, 195, 137, 0.3);
      line-height: 1;
    }

    /* Newsletter subscribe success */
    .subscribe-success {
      animation: successPulse 0.4s ease;
    }
    @keyframes successPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* Footer links hover underline */
    footer button:hover, footer a:hover {
      text-decoration: none;
    }
    footer li button {
      position: relative;
    }
    footer li button::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--straw);
      transition: width 0.3s ease;
    }
    footer li button:hover::after {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    function MonroeApp() {
      const [page, setPage] = useState('home');
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeWineFilter, setActiveWineFilter] = useState('all');
      const [scrollProgress, setScrollProgress] = useState(0);
      const [showModal, setShowModal] = useState(false);
      const [modalType, setModalType] = useState('');
      const [showLoading, setShowLoading] = useState(true);
      const [quizStep, setQuizStep] = useState(1);
      const [quizAnswers, setQuizAnswers] = useState({});
      const [showWineClub, setShowWineClub] = useState(false);
      const [formData, setFormData] = useState({
        name: '', email: '', phone: '', date: '', partySize: '', message: ''
      });

      useEffect(() => {
        const timer = setTimeout(() => setShowLoading(false), 800);
        return () => clearTimeout(timer);
      }, []);

      {/* Scroll handler: navbar, progress bar, wine club trigger */}
      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 60);
          const h = document.documentElement.scrollHeight - window.innerHeight;
          setScrollProgress(h > 0 ? (window.scrollY / h) * 100 : 0);
          if (window.scrollY > 2500 && !showWineClub) setShowWineClub(true);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, [showWineClub]);

      {/* IntersectionObserver for scroll reveal animations */}
      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
              }
            });
          },
          { threshold: 0.01, rootMargin: '0px 0px 50px 0px' }
        );
        const reveals = document.querySelectorAll('.reveal');
        reveals.forEach(el => observer.observe(el));
        // Reveal elements in viewport after React paint settles
        const revealVisible = () => {
          document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight + 200) el.classList.add('visible');
          });
        };
        const t1 = setTimeout(revealVisible, 50);
        const t2 = setTimeout(revealVisible, 300);
        const t3 = setTimeout(() => {
          document.querySelectorAll('.reveal:not(.visible)').forEach(el => el.classList.add('visible'));
        }, 1200);
        return () => { observer.disconnect(); clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); };
      }, [page]);

      {/* Parallax scroll effect */}
      useEffect(() => {
        const handleParallax = () => {
          document.querySelectorAll('.parallax-bg').forEach(el => {
            const rect = el.parentElement.getBoundingClientRect();
            const speed = 0.3;
            const offset = rect.top * speed;
            el.style.transform = `translateY(${offset}px)`;
          });
        };
        window.addEventListener('scroll', handleParallax, { passive: true });
        return () => window.removeEventListener('scroll', handleParallax);
      }, []);

      {/* Scroll to top on page change */}
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        setMenuOpen(false);
      }, [page]);

      const wines = [
        { id: 1, name: 'Cabernet Franc', type: 'Red', price: '$24', color: '#6B2C2C', notes: 'Elegant, structured, with earthy depth', pairing: 'Grilled steak, aged Gouda' },
        { id: 2, name: 'Petit Verdot', type: 'Red', price: '$24', color: '#4A1A1A', notes: 'Bold, tannic, layered complexity', pairing: 'Lamb, dark chocolate' },

                      <input type="date" name="date" value={formData.date} onChange={handleFormChange} className="form-input w-full px-4 py-3 rounded-lg" />
                      <input type="number" placeholder="Guest Count" name="partySize" value={formData.partySize} onChange={handleFormChange} className="form-input w-full px-4 py-3 rounded-lg" />
                      <textarea placeholder="Tell us about your vision..." name="message" value={formData.message} onChange={handleFormChange} className="form-input w-full px-4 py-3 rounded-lg h-24 resize-none"></textarea>

                    </div>
                  </div>
                )}
              </div>
            </div>

          <footer className="py-16 px-6" style={{background:'var(--river)'}}>

                <div className="flex gap-2 max-w-md">
                  <input type="email" placeholder="Your email" className="form-input flex-1 px-4 py-2 rounded text-gray-900" />

                  </ul>
                </div>
                <div>
                  <h4 className="font-bold mb-4 text-sm uppercase tracking-wider" style={{color:'var(--straw)'}}>Explore</h4>

                    <li><button onClick={() => openModal('tasting')} className="hover:opacity-100 transition">Reserve a Tasting</button></li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-bold mb-4 text-sm uppercase tracking-wider" style={{color:'var(--straw)'}}>The Barn</h4>

                    <p>4786 James Monroe Hwy</p>
                    <p>Colonial Beach, VA 22443</p>
                    <p className="mt-2 font-semibold">(804) 410-5628</p>
                  </div>
                </div>
                <div>
                  <h4 className="font-bold mb-4 text-sm uppercase tracking-wider" style={{color:'var(--straw)'}}>Downtown</h4>
                  <div className="text-sm opacity-80 space-y-1">
                    <p>10 Washington Ave.</p>
                    <p>Colonial Beach, VA 22443</p>
                    <p className="mt-2 font-semibold">Summer Sat 5–8pm</p>
                  </div>
                </div>
              </div>

              {/* Social */}
              <div className="flex justify-center gap-6 mb-10">
                <a href="https://www.facebook.com/monroebayvineyard" target="_blank" rel="noopener noreferrer" className="text-sm opacity-60 hover:opacity-100 transition" style={{color:'var(--straw)'}}>Facebook</a>
                <a href="https://www.instagram.com/monroebayvineyard" target="_blank" rel="noopener noreferrer" className="text-sm opacity-60 hover:opacity-100 transition" style={{color:'var(--straw)'}}>Instagram</a>
                <a href="mailto:info@monroebaywine.com" className="text-sm opacity-60 hover:opacity-100 transition" style={{color:'var(--straw)'}}>Email</a>
              </div>

              {/* Bottom */}
              <div className="pt-8 text-center text-sm opacity-60" style={{borderTop:'1px solid rgba(224,195,137,0.2)'}}>
                <p>&copy; 2026 Monroe Bay Vineyard & Cidery. All rights reserved.</p>
                <p className="mt-1">Chesapeake Bay Wine Trail · #1 Wine Trail in Virginia (2020) · Colonial Beach, VA</p>
              </div>
            </div>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MonroeApp />);
  </script>
