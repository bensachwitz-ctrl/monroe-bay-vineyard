<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monroe Bay Vineyard & Cidery | Colonial Beach, Virginia Wine Country</title>
  <meta name="description" content="Monroe Bay Vineyard: Award-winning wines, craft ciders, and weddings at our stunning straw bale barn on the historic James Monroe farm. Chesapeake Bay Wine Trail.">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #1B263B;
      --gold: #E0C389;
      --green-bottle: #2D6A4F;
      --creek: #4A7C8A;
      --cream: #FAF7F2;
      --sand: #D4C5A9;
      --text-dark: #2C3E50;
      --text-light: #F5F1E8;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      line-height: 1.6;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    .display-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .glass-nav {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(224, 195, 137, 0.15);
    }

    .glass-nav.scrolled {
      background: rgba(27, 38, 59, 0.85);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .ken-burns {
      animation: kenBurns 20s ease-in-out infinite alternate;
    }

    @keyframes kenBurns {
      from { transform: scale(1) translate(0, 0); }
      to { transform: scale(1.08) translate(-2%, -2%); }
    }

    .gold-clip {
      background: linear-gradient(135deg, #E0C389, #F4D89F, #E0C389);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    .wine-card {
      transition: all 0.3s ease;
      border: 1px solid rgba(45, 106, 79, 0.2);
      background: linear-gradient(135deg, rgba(250, 247, 242, 0.8), rgba(245, 241, 232, 0.6));
      backdrop-filter: blur(8px);
    }

    .wine-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(45, 106, 79, 0.15);
      border-color: rgba(224, 195, 137, 0.3);
    }

    .color-swatch {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 1rem;
    }

    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      animation: slideIn 0.7s ease forwards;
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #E0C389, #2D6A4F, #E0C389);
      width: 0%;
      z-index: 100;
      transition: width 0.1s linear;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      border: 2px solid var(--gold);
    }

    .btn-primary:hover {
      background: transparent;
      color: var(--gold);
      box-shadow: 0 8px 20px rgba(224, 195, 137, 0.2);
    }

    .btn-secondary {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--navy);
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: var(--navy);
      color: var(--cream);
    }

    .modal-backdrop {
      background: rgba(27, 38, 59, 0.7);
      backdrop-filter: blur(8px);
    }

    .modal-panel {
      background: linear-gradient(135deg, var(--cream), #F5F1E8);
      border: 1px solid rgba(224, 195, 137, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .form-input {
      border: 1px solid rgba(45, 106, 79, 0.2);
      background: rgba(250, 247, 242, 0.6);
      transition: all 0.3s ease;
    }

    .form-input:focus {
      border-color: var(--gold);
      background: rgba(250, 247, 242, 0.95);
      box-shadow: 0 0 0 3px rgba(224, 195, 137, 0.1);
      outline: none;
    }

    .wine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .wedding-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .wedding-gallery img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .wedding-gallery img:hover {
      transform: scale(1.03);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .bottle-divider {
      width: 100%;
      height: 120px;
      background: linear-gradient(to bottom, transparent, rgba(45, 106, 79, 0.05), transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2rem 0;
    }

    .bottle-divider svg {
      width: 40px;
      height: 80px;
      opacity: 0.3;
    }

    .parchment-bg {
      background: linear-gradient(135deg, rgba(212, 197, 169, 0.1), rgba(224, 195, 137, 0.08));
      border-radius: 8px;
      padding: 2rem;
    }

    .floating-cta {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 40;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1000;
      animation: fadeOut 0.6s ease 0.7s forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 2rem;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .nav-link {
      color: var(--text-light);
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link:hover {
      color: var(--gold);
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0%;
      height: 2px;
      background: var(--gold);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .hero-overlay {
      background: linear-gradient(
        135deg,
        rgba(27, 38, 59, 0.4),
        rgba(27, 38, 59, 0.25),
        rgba(45, 106, 79, 0.2)
      );
    }

    .quiz-option {
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid rgba(45, 106, 79, 0.2);
      padding: 1.5rem;
      border-radius: 8px;
      text-align: center;
      background: rgba(250, 247, 242, 0.5);
    }

    .quiz-option:hover {
      border-color: var(--gold);
      background: rgba(224, 195, 137, 0.1);
      transform: translateY(-4px);
    }

    .quiz-option.selected {
      border-color: var(--gold);
      background: rgba(224, 195, 137, 0.2);
    }

    @media (max-width: 768px) {
      .display-text {
        font-size: 2.5rem;
      }

      .wine-grid {
        grid-template-columns: 1fr;
      }

      .wedding-gallery {
        grid-template-columns: 1fr;
      }

      .wedding-gallery img {
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MonroeApp() {
      const [page, setPage] = useState('home');
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [activeWineFilter, setActiveWineFilter] = useState('all');
      const [scrollProgress, setScrollProgress] = useState(0);
      const [showModal, setShowModal] = useState(false);
      const [modalType, setModalType] = useState('');
      const [showLoading, setShowLoading] = useState(true);
      const [quizStep, setQuizStep] = useState(1);
      const [quizAnswers, setQuizAnswers] = useState({});
      const [showWineClub, setShowWineClub] = useState(false);
      const [formData, setFormData] = useState({
        name: '', email: '', phone: '', date: '', partySize: ''
      });

      useEffect(() => {
        const timer = setTimeout(() => setShowLoading(false), 700);
        return () => clearTimeout(timer);
      }, []);

      useEffect(() => {
        const handleScroll = () => {
          setScrolled(window.scrollY > 50);
          const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
          const progress = scrollHeight > 0 ? (window.scrollY / scrollHeight) * 100 : 0;
          setScrollProgress(progress);

          if (window.scrollY > 3000 && !showWineClub) {
            setShowWineClub(true);
          }
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [showWineClub]);

      const wines = [
        { id: 1, name: 'Cabernet Franc', type: 'Red', price: '$24', color: '#6B2C2C', notes: 'Elegant, structured', pairing: 'Grilled steak, aged cheese' },
        { id: 2, name: 'Petit Verdot', type: 'Red', price: '$24', color: '#4A1A1A', notes: 'Bold, complex', pairing: 'Lamb, dark chocolate' },
        { id: 3, name: 'Viognier', type: 'White', price: '$22', color: '#D4AF37', notes: 'Aromatic, fruity', pairing: 'Seafood, stone fruits' },
        { id: 4, name: 'Chardonnay', type: 'White', price: '$22', color: '#E8D4A0', notes: 'Smooth, buttery', pairing: 'Poultry, cream sauces' },
        { id: 5, name: 'Petit Manseng', type: 'White', price: '$22', color: '#F0E68C', notes: 'Crisp, citrus', pairing: 'Appetizers, white fish' },
        { id: 6, name: 'Chambourcin', type: 'Red', price: '$20', color: '#5C3D3D', notes: 'Medium-bodied, fruity', pairing: 'Pasta, barbecue' },
        { id: 7, name: 'Tramminette', type: 'White', price: '$20', color: '#E6D8B4', notes: 'Floral, spicy', pairing: 'Asian cuisine, spicy dishes' },
        { id: 8, name: 'Pinot Grigio', type: 'White', price: '$20', color: '#F5E6D3', notes: 'Crisp, refreshing', pairing: 'Summer salads, light fare' },
        { id: 9, name: 'Blue Heron Red', type: 'Red', price: '$20', color: '#6B3E3E', notes: 'Approachable, friendly', pairing: 'Daily drinking, pizza' },
        { id: 10, name: 'Blue Heron White', type: 'White', price: '$18', color: '#E8D4A0', notes: 'Soft, easy-drinking', pairing: 'Brunch, casual meals' },
        { id: 11, name: 'Blue Heron Rosé', type: 'Rosé', price: '$20', color: '#E8A8A8', notes: 'Dry, elegant', pairing: 'Salads, seafood, sunset' },
      ];

      const ciders = [
        { name: 'Boardwalk Cider', notes: 'Semi-Sweet', detail: 'Light, approachable, perfect for newcomers' },
        { name: 'Hard Apple Cider', notes: 'Dry', detail: 'Virginia Hughes Crab apples—the same cultivar President Monroe grew' },
        { name: 'Hopped Cider', notes: 'Dry-Bitter', detail: 'Bold, craft-forward, for the adventurous palate' },
        { name: 'Pumpkin Spice Cider', notes: 'Seasonal', detail: 'Autumn in a bottle, spiced and warming' },
      ];

      const filteredWines = activeWineFilter === 'all'
        ? wines
        : wines.filter(w => w.type === activeWineFilter);

      const openModal = (type) => {
        setModalType(type);
        setShowModal(true);
      };

      const closeModal = () => {
        setShowModal(false);
        setModalType('');
      };

      const handleFormChange = (e) => {
        setFormData({
          ...formData,
          [e.target.name]: e.target.value
        });
      };

      const handleQuizAnswer = (answer) => {
        const newAnswers = { ...quizAnswers, [`q${quizStep}`]: answer };
        setQuizAnswers(newAnswers);

        if (quizStep < 3) {
          setQuizStep(quizStep + 1);
        } else {
          setQuizStep(4);
        }
      };

      const getQuizResult = () => {
        const answers = Object.values(quizAnswers).join('');
        const results = {
          'bold': { wine: 'Cabernet Franc', desc: 'A wine of distinction and depth—serious, structured, unforgettable.' },
          'light': { wine: 'Viognier', desc: 'Elegant and aromatic—the Virginia flagship that captures sunshine in a glass.' },
          'smooth': { wine: 'Chardonnay', desc: 'Velvety and approachable—comfort in a bottle, perfect for any moment.' },
          'fun': { wine: 'Blue Heron Rosé', desc: 'Playful, dry, elegant—for those who embrace life\'s golden hours.' },
        };

        if (answers.includes('bold')) return results.bold;
        if (answers.includes('light')) return results.light;
        if (answers.includes('smooth')) return results.smooth;
        return results.fun;
      };

      return (
        <>
          {showLoading && (
            <div className="loading-screen">
              <div className="loading-logo text-4xl">🍇</div>
              <div className="h-1 w-48 bg-gray-300 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-yellow-600 to-yellow-500" style={{width: '100%'}}></div>
              </div>
            </div>
          )}

          <div className="scroll-progress" style={{ width: `${scrollProgress}%` }}></div>

          {/* NAVBAR */}
          <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'glass-nav scrolled' : 'glass-nav'}`}>
            <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
              <button
                onClick={() => setPage('home')}
                className="text-xl font-bold text-yellow-500 hover:text-yellow-400 transition"
              >
                🍇 MONROE BAY
              </button>

              <div className="hidden md:flex items-center gap-8">
                {['home', 'cellar', 'barn', 'weddings', 'story', 'events', 'visit'].map(p => (
                  <button
                    key={p}
                    onClick={() => { setPage(p); setMenuOpen(false); }}
                    className={`nav-link text-sm uppercase tracking-wider ${page === p ? 'text-yellow-400' : ''}`}
                  >
                    {p.charAt(0).toUpperCase() + p.slice(1)}
                  </button>
                ))}
              </div>

              <button
                onClick={() => openModal('tasting')}
                className="btn-primary px-6 py-2 rounded text-sm hidden md:inline-block"
              >
                Reserve
              </button>

              <button
                onClick={() => setMenuOpen(!menuOpen)}
                className="md:hidden text-yellow-500"
              >
                ☰
              </button>
            </div>

            {menuOpen && (
              <div className="md:hidden bg-black bg-opacity-50 p-6 flex flex-col gap-4">
                {['home', 'cellar', 'barn', 'weddings', 'story', 'events', 'visit'].map(p => (
                  <button
                    key={p}
                    onClick={() => { setPage(p); setMenuOpen(false); }}
                    className="text-left text-yellow-400 uppercase text-sm"
                  >
                    {p.charAt(0).toUpperCase() + p.slice(1)}
                  </button>
                ))}
                <button
                  onClick={() => { openModal('tasting'); setMenuOpen(false); }}
                  className="btn-primary px-4 py-2 rounded text-sm"
                >
                  Reserve a Tasting
                </button>
              </div>
            )}
          </nav>

          {/* PAGES */}
          <main className="pt-20">

            {/* HOME PAGE */}
            {page === 'home' && (
              <div>
                {/* HERO */}
                <section className="relative w-full h-screen flex items-center justify-center overflow-hidden">
                  <img
                    src="images/pro-barn-cathedral.jpg"
                    alt="Monroe Bay Wedding Couple with Sparkler"
                    className="absolute inset-0 w-full h-full object-cover ken-burns"
                  />
                  <div className="absolute inset-0 hero-overlay"></div>
                  <div className="relative z-10 text-center px-6 max-w-3xl">
                    <div className="display-text gold-clip mb-4">MONROE BAY</div>
                    <h1 className="text-4xl md:text-5xl font-bold text-white mb-6">Vineyard & Cidery</h1>
                    <p className="text-lg text-gray-200 mb-8 max-w-2xl mx-auto">
                      Where a president was born. Where bottles become stained glass. Where every sunset tastes like summer.
                    </p>
                    <button
                      onClick={() => openModal('tasting')}
                      className="btn-primary px-8 py-3 rounded-lg text-base"
                    >
                      Reserve a Tasting
                    </button>
                  </div>
                </section>

                {/* QUICK INFO BAR */}
                <section className="bg-gradient-to-r from-blue-900 via-teal-800 to-green-900 py-6">
                  <div className="max-w-6xl mx-auto px-6 grid grid-cols-2 md:grid-cols-4 gap-6 text-center text-white">
                    <div>
                      <div className="text-sm uppercase tracking-wider opacity-75">Hours</div>
                      <div className="text-lg font-bold">Sat-Sun 12-5pm</div>
                      <div className="text-xs opacity-75">Apr–Dec</div>
                    </div>
                    <div>
                      <div className="text-sm uppercase tracking-wider opacity-75">Location</div>
                      <div className="text-lg font-bold">Colonial Beach</div>
                      <div className="text-xs opacity-75">Virginia</div>
                    </div>
                    <div>
                      <div className="text-sm uppercase tracking-wider opacity-75">Tasting Fee</div>
                      <div className="text-lg font-bold">$9</div>
                      <div className="text-xs opacity-75">Per Person</div>
                    </div>
                    <div>
                      <div className="text-sm uppercase tracking-wider opacity-75">Call</div>
                      <div className="text-lg font-bold">(804) 410-5628</div>
                      <div className="text-xs opacity-75">We'd love to hear from you</div>
                    </div>
                  </div>
                </section>

                {/* LIGHT THROUGH GLASS */}
                <section className="py-20 px-6 bg-white">
                  <div className="max-w-6xl mx-auto">
                    <h2 className="text-4xl font-bold text-center mb-4 text-blue-900">Light Through Glass</h2>
                    <p className="text-center text-gray-700 mb-16 max-w-2xl mx-auto">
                      Light filters through recycled wine bottles embedded in our straw bale walls, creating a stained-glass effect that shifts with the sun. It's almost magical.
                    </p>
                    <div className="grid md:grid-cols-3 gap-8">
                      <div className="text-center">
                        <div className="text-5xl mb-4">🍇</div>
                        <h3 className="text-2xl font-bold mb-3 text-blue-900">The Vineyard</h3>
                        <p className="text-gray-700">
                          Virginia's flagship Viognier alongside bold Cab Francs and elegant Petit Verdots. Every bottle tells the story of our terroir.
                        </p>
                      </div>
                      <div className="text-center">
                        <div className="text-5xl mb-4">🏠</div>
                        <h3 className="text-2xl font-bold mb-3 text-blue-900">The Barn</h3>
                        <p className="text-gray-700">
                          A 3,000 sq ft masterpiece of straw bales and recycled bottles. Built by Amish craftsmen and 40 volunteers. Seats 200. Unforgettable.
                        </p>
                      </div>
                      <div className="text-center">
                        <div className="text-5xl mb-4">🌊</div>
                        <h3 className="text-2xl font-bold mb-3 text-blue-900">The Creek</h3>
                        <p className="text-gray-700">
                          75 acres of waterfront shoreline on Monroe Creek. Adirondack chairs, sunset views, and the taste of something truly special.
                        </p>
                      </div>
                    </div>
                  </div>
                </section>

                {/* EXPERIENCE SECTION */}
                <section className="py-20 px-6 bg-gray-50">
                  <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                    <div>
                      <h2 className="text-4xl font-bold mb-6 text-blue-900">The Strawbale Barn</h2>
                      <p className="text-gray-700 mb-4 text-lg">
                        Built in 2019, our barn is constructed from straw bales covered in hydraulic lime—the same material used in French castle walls. Recycled wine bottles embedded in the walls create stained-glass windows that filter light throughout the day.
                      </p>
                      <p className="text-gray-700 mb-6 text-lg">
                        The "Love Window" is our most famous feature—wine bottles arranged to spell LOVE. Pet-friendly. Bring your picnic. This is wine country the way it should be.
                      </p>
                      <button
                        onClick={() => setPage('barn')}
                        className="btn-secondary px-6 py-3 rounded"
                      >
                        Learn More About the Barn
                      </button>
                    </div>
                    <img
                      src="images/pro-barn-interior-full.jpg"
                      alt="Monroe Bay Barn Interior Reception"
                      className="w-full rounded-lg shadow-lg object-cover h-96"
                    />
                  </div>
                </section>

                {/* WINE PREVIEW */}
                <section className="py-20 px-6 bg-white">
                  <div className="max-w-6xl mx-auto">
                    <h2 className="text-4xl font-bold text-center mb-4 text-blue-900">Our Wines</h2>
                    <p className="text-center text-gray-700 mb-16 max-w-2xl mx-auto">
                      From Virginia's flagship Viognier to age-worthy Cabernet Francs, each bottle reflects our terroir.
                    </p>
                    <div className="wine-grid">
                      {wines.slice(0, 8).map(wine => (
                        <div key={wine.id} className="wine-card rounded-lg p-6">
                          <div className="color-swatch" style={{background: wine.color}}></div>
                          <h4 className="text-xl font-bold text-blue-900 mb-2">{wine.name}</h4>
                          <p className="text-sm text-gray-600 mb-2">{wine.type}</p>
                          <p className="text-lg font-bold text-yellow-600 mb-3">{wine.price}</p>
                          <p className="text-sm text-gray-700">{wine.notes}</p>
                        </div>
                      ))}
                    </div>
                    <div className="text-center mt-12">
                      <button
                        onClick={() => setPage('cellar')}
                        className="btn-primary px-8 py-3 rounded-lg"
                      >
                        See All Wines & Ciders
                      </button>
                    </div>
                  </div>
                </section>

                {/* WINE QUIZ */}
                <section className="py-20 px-6 bg-gradient-to-br from-blue-50 to-teal-50">
                  <div className="max-w-2xl mx-auto">
                    <h2 className="text-4xl font-bold text-center mb-4 text-blue-900">Which Wine Are You?</h2>
                    <p className="text-center text-gray-700 mb-12">
                      Take our fun quiz to find your perfect Monroe Bay wine.
                    </p>

                    {quizStep < 4 ? (
                      <div className="bg-white rounded-lg p-8 shadow-lg">
                        {quizStep === 1 && (
                          <div>
